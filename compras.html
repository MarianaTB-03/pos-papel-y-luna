<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Papel y Luna — Compras</title>
  <link rel="stylesheet" href="css/componentes.css" />
  <link rel="stylesheet" href="css/paginas.css" />
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="navbar-marca">
      <img src="img/logo.png" alt="Logo" class="navbar-logo"
        onerror="this.style.display='none'; document.getElementById('nav-ph').style.display='flex';" />
      <div class="navbar-logo-placeholder" id="nav-ph" style="display:none;">🌙</div>
      <div class="navbar-marca-texto">
        <strong>Papel y Luna</strong>
        <span>Papelería y Miscelánea</span>
      </div>
    </a>
    <a href="index.html" class="navbar-inicio">← Inicio</a>
  </nav>

  <div id="loading-compras" style="text-align:center;padding:60px;font-size:1rem;color:var(--gris);">
    ⏳ Cargando datos...
  </div>

  <main class="pagina-contenido" id="contenido-compras" style="display:none;">

    <div class="alerta alerta-exito" id="alerta-compras" style="margin-bottom:16px;"></div>
    <div class="alerta alerta-error" id="alerta-error-compras" style="margin-bottom:16px;"></div>

    <div class="inventario-header">
      <h1>🛒 Registro de Compras</h1>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; align-items:start;">

      <!-- FORMULARIO NUEVA COMPRA -->
      <div class="card">
        <div class="card-header"><h2>➕ Nueva Compra</h2></div>
        <div class="card-body">

          <div class="form-group">
            <label>Proveedor (opcional)</label>
            <select id="compra-proveedor">
              <option value="">— Sin proveedor —</option>
            </select>
          </div>

          <hr style="border:none;border-top:1px solid var(--y3);margin:12px 0;" />

          <!-- Agregar producto a la compra -->
          <div class="form-group">
            <label>Buscar producto</label>
            <div class="buscador-wrap" style="margin-bottom:0;">
              <span class="icono-buscar">🔍</span>
              <input type="text" class="buscador-input" id="compra-buscar"
                placeholder="Nombre o código..."
                autocomplete="off" oninput="buscarProductoCompra(this.value)" />
              <div class="buscador-resultados" id="compra-resultados"></div>
            </div>
          </div>

          <!-- Tabla items de compra -->
          <div style="margin:12px 0;">
            <table class="tabla-base" id="tabla-compra-items">
              <thead>
                <tr>
                  <th>Producto</th>
                  <th style="text-align:center;">Cant.</th>
                  <th>Costo Unit.</th>
                  <th>Subtotal</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="tbody-compra"></tbody>
            </table>
            <div class="estado-vacio" id="compra-vacia" style="padding:16px;text-align:center;color:var(--gris);font-size:0.88rem;">
              Agrega productos a la compra
            </div>
          </div>

          <div id="compra-total-fila" style="display:none; justify-content:space-between; align-items:center; padding:10px 0; border-top:2px solid var(--y3); font-weight:700; font-size:1.05rem;">
            <span>Total Compra:</span>
            <span id="compra-total">$0</span>
          </div>

          <button class="btn-primary" style="width:100%;margin-top:14px;" id="btn-registrar-compra" onclick="registrarCompra()">
            ✅ Registrar Compra
          </button>
        </div>
      </div>

      <!-- HISTORIAL DE COMPRAS -->
      <div class="card">
        <div class="card-header">
          <h2>📋 Historial de Compras</h2>
          <button class="btn-secondary btn-sm" onclick="recargarCompras()">🔄</button>
        </div>
        <div class="card-body" style="padding:0;">
          <div id="compras-lista" style="max-height:520px;overflow-y:auto;"></div>
          <div class="estado-vacio oculto" id="compras-vacio" style="padding:24px;text-align:center;">
            No hay compras registradas.
          </div>
        </div>
      </div>

    </div>

  </main>

  <script src="js/api.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/compras.js"></script>
</body>
</html>
